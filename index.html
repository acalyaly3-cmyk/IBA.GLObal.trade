<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBA | Worldwide Executive Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #000d1a; --gold: #d4af37; --white: #ffffff; --glass: rgba(255, 255, 255, 0.03); }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--navy); color: var(--white); overflow-x: hidden; }
        
        /* Premium Navigation */
        nav { background: rgba(0, 13, 26, 0.95); padding: 20px 8%; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { color: var(--gold); font-size: clamp(18px, 4vw, 28px); font-weight: 900; text-decoration: none; letter-spacing: 2px; }

        /* Global Impact Hero */
        .hero { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 10%; background: radial-gradient(circle at center, #001f3f 0%, #000d1a 100%); position: relative; }
        .hero h1 { font-size: clamp(35px, 6vw, 65px); color: var(--gold); margin: 0; line-height: 1.1; }
        .hero p { font-size: clamp(18px, 2.5vw, 28px); margin: 30px auto; max-width: 900px; color: #ccc; }

        /* Worldwide Reach Bar */
        .scroller { background: var(--gold); color: var(--navy); padding: 10px 0; font-weight: 900; font-size: 12px; white-space: nowrap; overflow: hidden; position: relative; }
        .scroller-inner { display: inline-block; animation: scroll 30s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Executive Pillars */
        .section { padding: 100px 8%; background: var(--white); color: var(--navy); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { padding: 50px; border-radius: 20px; background: var(--light-gray); border-right: 8px solid var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.05); transition: 0.4s; }
        .card:hover { transform: translateY(-10px); background: #fff; }
        .card h3 { font-size: 26px; margin-bottom: 20px; color: var(--navy); }

        /* Global Procurement Center */
        .order-zone { padding: 100px 8%; background: #00152b; }
        .glass-form { max-width: 800px; margin: 0 auto; background: var(--glass); padding: 60px; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.3); backdrop-filter: blur(15px); }
        .glass-form h2 { color: var(--gold); text-align: center; font-size: 36px; margin-bottom: 40px; }
        input, select, textarea { width: 100%; padding: 18px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #333; background: rgba(0,0,0,0.2); color: white; font-family: 'Cairo'; }
        .submit-btn { width: 100%; padding: 20px; background: var(--gold); color: var(--navy); border: none; border-radius: 10px; font-weight: 900; font-size: 22px; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: white; transform: scale(1.02); }

        /* Quick Access Footer */
        .dock { position: fixed; bottom: 20px; right: 20px; left: 20px; background: rgba(0, 13, 26, 0.9); padding: 15px; border-radius: 50px; border: 1px solid var(--gold); display: flex; justify-content: center; gap: 20px; backdrop-filter: blur(10px); z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dock-btn { color: var(--gold); text-decoration: none; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; }

        footer { padding: 120px 8% 100px; text-align: center; font-size: 14px; color: #555; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">IBA | WORLDWIDE MANAGEMENT</a>
        <div style="color: var(--gold); font-weight: 900;">علي إبراهيم</div>
    </nav>

    <div class="scroller">
        <div class="scroller-inner">
