<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBA | Direct Global Trade</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #001f3f; --gold: #c5a059; --bg: #f8f9fa; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--bg); color: var(--navy); }
        
        /* Navigation */
        nav { background: var(--navy); padding: 20px 5%; border-bottom: 4px solid var(--gold); text-align: center; }
        nav .brand { color: var(--gold); font-size: 28px; font-weight: bold; letter-spacing: 2px; }

        /* Hero */
        .hero { background: linear-gradient(rgba(0,31,63,0.85), rgba(0,31,63,0.85)), url('https://images.unsplash.com/photo-1578575437130-527eed3abbec?auto=format&fit=crop&q=80&w=1000'); background-size: cover; background-position: center; color: white; padding: 100px 5%; text-align: center; }
        .hero h1 { font-size: 45px; margin-bottom: 10px; color: var(--gold); }
        .hero p { font-size: 22px; max-width: 800px; margin: 0 auto; opacity: 0.9; }

        /* Direct Pillars */
        .section { padding: 80px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .pillar-card { background: white; padding: 40px; border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid var(--gold); }
        .pillar-card h3 { font-size: 24px; margin-bottom: 20px; color: var(--navy); }
        .pillar-card p { line-height: 1.8; color: #555; }

        /* Call to Action */
        .cta-bar { background: var(--gold); color: var(--navy); padding: 40px; text-align: center; font-weight: bold; font-size: 20px; }
