<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBA | Global Strategic Hub - Ali Ibrahim</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #001a33; --gold: #b89146; --white: #ffffff; --accent: #003366; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #f4f7f9; color: var(--navy); overflow-x: hidden; }
        
        /* Global Navigation */
        nav { background: var(--navy); padding: 15px 5%; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--gold); font-size: 24px; font-weight: 900; text-decoration: none; letter-spacing: 1px; }
        
        /* Hero Section */
        .hero { background: linear-gradient(rgba(0,26,51,0.9), rgba(0,26,51,0.9)), url('https://images.unsplash.com/photo-1578575437130-527eed3abbec?auto=format&fit=crop&q=80&w=1400'); background-size: cover; background-position: center; color: white; padding: 120px 5%; text-align: center; border-bottom: 10px solid var(--gold); }
        .hero h1 { font-size: clamp(30px, 5vw, 60px); color: var(--gold); margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero p { font-size: clamp(18px, 2vw, 26px); margin: 25px auto; max-width: 1000px; opacity: 0.9; line-height: 1.6; }

        /* Global Reach Bar */
        .reach-bar { background: var(--gold); color: var(--navy); padding: 12px; text-align: center; font-weight: 900; font-size: 14px; white-space: nowrap; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .scroll-content { display: inline-block; animation: scroll 25s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Strategic Pillars */
        .section { padding: 80px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .card { background: white; padding: 45px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border-top: 5px solid var(--gold); transition: 0.4s; }
