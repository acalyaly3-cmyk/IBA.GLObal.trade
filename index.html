<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBA | Worldwide Trade & Supply Chain</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #001a33; --gold: #b89146; --white: #ffffff; --light-gray: #f8f9fa; }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: var(--light-gray); color: var(--navy); overflow-x: hidden; }
        
        /* Premium Header */
        .top-nav { background: var(--navy); color: var(--gold); padding: 10px 8%; display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; border-bottom: 2px solid var(--gold); }
        header { background: white; padding: 20px 8%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .logo-placeholder { font-family: 'Playfair Display', serif; font-size: 30px; letter-spacing: 2px; color: var(--navy); }

        /* Worldwide Hero Section */
        .hero { background: linear-gradient(rgba(0,26,51,0.9), rgba(0,26,51,0.9)), url('https://images.unsplash.com/photo-1578575437130-527eed3abbec?auto=format&fit=crop&q=80&w=1200'); background-size: cover; background-position: center; color: white; padding: 100px 8%; text-align: center; position: relative; }
        .hero h1 { font-size: clamp(32px, 5vw, 55px); color: var(--gold); margin: 0; }
        .hero p { font-size: clamp(18px, 2vw, 24px); max-width: 900px; margin: 20px auto; opacity: 0.9; }

        /* Strategy Cards */
        .section-title { text-align: center; margin: 60px 0 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 0 8% 60px; }
        .card { background: white; padding: 35px; border-radius: 15px; border-bottom: 5px solid var(--gold); transition: 0.4s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card h3 { color: var(--navy); font-size: 22px; margin-bottom: 15px; }

        /* Global Map Simulation (CSS) */
        .global-reach { background: #fdfdfd; padding: 60px 8%; text-align: center; }
        .regions { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 30px; }
        .region-tag { border: 1px solid var(--gold); padding: 10px 25px; border-radius: 30px; color: var(--navy); font-weight: bold; font-size: 14px; background: white; }

        /* Contact Section */
        .contact { background: var(--navy); color: white; padding: 80px 8%; text-align: center; }
        .call-btn { background: var(--gold); color: var(--navy); padding: 15px 35px; text-decoration: none; display: inline-block; border-radius: 5px; font-weight: bold; font-size: 18px; margin: 10px; }
        
        /* Floating WhatsApp */
        .wa-float { position: fixed; bottom: 30px; left: 30px; background: #25d366; color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 9999; text-decoration: none; }

        footer { background: #000a14; color: #777; padding: 30px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <span>IBA | Global Deal Maker | Ali Ibrahim</span>
        <span>Contact: +201017979565</span>
    </div>

    <header>
        <div class="logo-placeholder
